name: Naver Blog to Telegram

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 체크
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore last post IDs
        uses: actions/cache/restore@v4
        with:
          path: naver_last_ids.json
          key: naver-last-ids

      - name: Run crawler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python naver_to_telegram.py

      - name: Save last post IDs
        uses: actions/cache/save@v4
        with:
          path: naver_last_ids.json
          key: naver-last-ids-${{ github.run_id }}
