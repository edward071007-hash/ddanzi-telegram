name: Naver Blog to Telegram

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 체크
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run crawler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python naver_to_telegram.py

      - name: Save last post IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add naver_last_ids.json
          git diff --cached --quiet || git commit -m "update naver last ids" && git push
